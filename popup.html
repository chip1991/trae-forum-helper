<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRAE 中文社区自动浏览助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>TRAE 中文社区</h1>
      <p class="subtitle">自动浏览助手</p>
    </header>

    <main class="main">
      <div class="status-section">
        <div class="status-indicator" id="statusIndicator">
          <span class="status-dot"></span>
          <span class="status-text" id="statusText">就绪</span>
        </div>
        <div class="stats" id="stats">
          <span>帖子总数: <strong id="postCount">0</strong></span>
          <span>当前进度: <strong id="currentPost">0</strong></span>
        </div>
      </div>

      <div class="control-section">
        <button class="btn btn-start" id="startBtn">
          <span class="btn-icon">▶</span>
          开始自动浏览
        </button>
        <button class="btn btn-stop" id="stopBtn" disabled>
          <span class="btn-icon">⏹</span>
          停止
        </button>
      </div>

      <div class="settings-section">
        <h3>浏览设置</h3>
        <div class="setting-item">
          <label for="viewDuration">浏览时间（秒）：</label>
          <input type="number" id="viewDuration" min="5" max="300" value="30">
          <button class="btn-save" id="saveSettingsBtn">保存</button>
        </div>
      </div>

      <div class="info-section">
        <h3>使用说明</h3>
        <ol>
          <li>访问 <a href="https://forum.trae.cn/" target="_blank">forum.trae.cn</a></li>
          <li>点击"开始自动浏览"按钮</li>
          <li>插件会自动浏览每个帖子30秒并点赞</li>
          <li>处理完所有帖子后自动停止</li>
        </ol>
      </div>
    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
